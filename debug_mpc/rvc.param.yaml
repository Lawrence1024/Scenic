/**:
  ros__parameters:
    fence_safety:
      timeout: 0.5
      trigger_distance: 0.0
    
    rvc:
      control_output_interval_sec: 0.01
      max_front_wheel_angle_rad: 0.2815999998093
      wheelbase_m: 2.9718
      track_m: 1.6
      vehicle_weight_kg: 753.87
      turn_left_bias_deg: 0.0
      path_planning_mode: 0 # 0 for internal path planner on timer; 1 for subscribing to RFP
      planning_interval_sec: 0.01 # if path_planning_mode is 0, what's the interval of internal planning

    planner:
      delay: 0.0 # Computation plus actuator communication delay
      enable_delay_shifting: false
      step_interval_sec: 0.01
      bank_angle_thres: 0.02
      smoothness_factor: 0.05
      lookahead:
        speed_ratio: 0.55
        lateral_error_ratio: 10.0
        lateral_error_ratio_bypass_ttl: [27]
        max_distance_m: 100.0
        min_distance_m: 10.0
      distance_between_waypoints_m: 0.2
      # If the lateral error is above this value, the vehicle will not accelerate
      no_acc_above_lateral_error_m: 2.0
      min_maintained_speed_mps: 5.0

    plugins:
      - "race::InputValidation"
      - "race::PathPlannerPlugin"
      - "race::Timeout"
      - "race::ModelBasedLonControl"
      # - "race::LonControl"
      # - "race::ModelBasedLatControl"
      # - "race::LateralCompensation"
      # - "race::LqgControllerPlugin"
      # - "race::ArtMpcPlugin"
      - "race::PurePursuitController"
      # - "race::AwLatMPCPlugin"
      # - "race::StanleyController"
      - "race::LateralCompensation"
      # - "race::AdaptiveLateralCompensation"
      # - "race::LqgControllerPlugin"
      # - "race::ArtMpcPlugin"
      # - "race::CBFLaneKeeping"
      # - "race::SyntheticSteeringCommand"
      # - "race::StepSteeringCommand"
      - "race::GearManagerPlugin"
      - "race::Compliance"
      - "race::Override"
      - "race::Push2PassHandler"
      - "race::AddSteerBias"
      - "race::TestHarness"
      # - "race::CheckOutsideTrack"
    
    synthetic_steering_command:
      freq: 3.0
      amplitude: 0.01
      activated: false

    step_steering_command:
      max_steer: 0.01
      step_size: 0.01
      step_width: 0.5
      activated: false

    test_harness:
      override_throttle: false
      override_throttle_value: 0.0
      override_brake: false
      override_brake_value: 0.0
      override_steer: false
      override_steer_value: 0.0

    model_lon_control:
      as_backup: false
      throttle_scale: 1.0
      throttle_max: 100.0
      acc_pid:
        kp: 1.5
        ki: 0.06
        kd: 0.01
        min_cmd: -20.0
        max_cmd: 15.0
        min_i: -2.0
        max_i: 2.0
      norminal_max_dcc: -15.0
      brake_deadband_psi: 100.0
      parking_brake_psi: 500.0
      stopping_speed: 2.0
      output_cutoff_freq: 2.0
      lon_control_type: 0
      enable_advanced_braking: false
      enable_abs: false                       # Enable/disable ABS intervention
      use_wheel_speed_report: false           # Enable/disable use of wheel speed data for slip calculations
      abs_intervention_factor: 0.95           # factor to reduce brake pressure when ABS is active
      enable_predictive_braking: true         # Enable predictive braking algorithm
      predictive_brake_lookahead: 6.0         # Time horizon for predictive braking (s)
      speed_tracking_tolerance: 0.8          # Acceptable speed error for precise tracking (m/s)
      brake_modulation_factor: 1.2            # Fine-tuning factor for brake pressure adjustment
      deceleration_deadband: 0.05             # Minimum deceleration threshold (m/s²)
      brake_smoothing_factor: 0.9             # Smoothing factor to prevent brake oscillations (0.0-1.0, higher = more smoothing)
      enable_enhanced_throttle_filtering: false 
      enhanced_throttle_deadband: 5.0        
      enhanced_filter_factor: 0.3

      test_mode:
        enabled: false
        max_brake: 2000.0
    
    follow_mode:
      max_speed_diff_mps: 15.0
      gap_diff_ratio: 0.2
    
    abs:
      wheel_radius: 0.29
      use_mpc: 1
      abs_pid:
        kp: 25000.0
        ki: 2.4
        kd: 0.5
        min_cmd: 500.
        max_cmd: 4000.
        min_i: -1000.
        max_i: 3000.
        target_slip: 0.1
        i_start: 1000.0
        trigger: 1000.0
      abs_mpc:
        K_tao: 15.
        moi: 11.9
        delay_steps: 0
        time_step: 0.05

    lon_tire_params:
      Fz0: 7109.0
      pdx1: 1.36527
      pdx2: -0.24548
      pcx1: 1.49561
      pkx1: 46.5687
      pkx2: 3.46431e-05
      pkx3: 0.0272879
      pex1: 0.0
      pex2: -0.205265
      pex3: 0.261099
      phx1: 0.000435981
      phx2: -0.000263798
      pvx1: -0.0158688
      pvx2: 0.0381263
      
    model_lat_control:
      stopping_speed: 2.0
      output_cutoff_freq: 0.5
      steering_bias_deg: 0.66

    compliance:
      max_throttle_cmd: 100.0
      max_brake_cmd: 3000.0
      min_brake_cmd_under_stop: 200.0

    timeout:
      kinematic_state: 2.0
      ttl_command: 2.0
      manual_command: 20.0
      trajectory: 1.0
      output_command: 0.5

    pure_pursuit:
      as_backup: false
      output_cutoff_freq: 10.0
      lat_error_thres: -0.1
      lookahead_rate_limit: 100.0 # max rate of change of lookahead point, which should be greater or equal to the top vehicle speed
      use_vel_yaw_conversion: false # Whether to use velocity angle
      bank_angle_const: 0.0

    stanley:
      as_backup: false                    
      k_cte: 1.8
      k_soft: 3.5
      k_heading: 0.5
      max_steer_angle: 0.281              
      min_speed: 2.0                    
      enable_curvature_feedforward: true
      curvature_feedforward_gain: 0.1
      enable_integral_control: false
      k_integral: 0.005
      integral_windup_limit: 0.1
      enable_predictive_cte: false
      prediction_time: 0.05
      enable_error_adaptation: false
      error_adaptation_rate: 0.3
      max_gain_multiplier: 2.0
      output_cutoff_freq: 10.0
      steering_rate_limit: 0.1
      cte_rate_limit: 20.0
      lookahead_rate_limit: 100.0        
      lane_change_merged_threshold: 0.1
      lane_change_smoothing_time: 2.0
      lane_change_gain_reduction: 0.3
      lane_change_error_threshold: 0.3
      lat_error_thres: 0.1 
      use_vel_yaw_conversion: false     
      bank_angle_const: 0.05

    override:
      throttle_threshold: 10.0
      brake_threshold: 100.0
      steer_threshold_deg: 4.0
      max_manual_speed_mps: 14.0
      steer_decay:
        # the decay follows -0.5 sin(x) + 0.5 in [-pi/2, pi/2] such that the scale goes from 1 to 0.
        start_speed_mps: 10.0 # when higher than this, steering override scale decreases. recommend >= max_manual_speed_mps
        end_speed_mps: 30.0 # when higher than this, steering override is turned off. must > decay_start_speed_mps
      throttle_limit_by_mode:
        safe: 50.0
        nominal: 100.0
        quiet: 70.0
        pit_lane: 50.0
        practice: 100.0
        qualification: 100.0
        race: 100.0
        overboost: 100.0

    lateral_compenstation:
      enabled: false
      min_speed: 2.0
      step_interval_sec: 0.01
      lateral_pid:
        kp: 0.01
        ki: 0.005
        kd: 0.005
        min_cmd: -0.01
        max_cmd: 0.01
        min_i: -0.006
        max_i: 0.006
      
    gear_manager:
      gear_numbers: [1, 2, 3, 4, 5, 6]
      min_rpms: [2300.0, 2300.0, 2700.0, 3100.0, 4000.0, 4000.0]
      max_rpms: [4500.0, 5000.0, 5000.0, 5600.0, 6000.0, 6000.0]
      gear_change_wait_sec: 0.5
      modes:
        safe:
          # Failsafe mode - extremely conservative to protect engine
          min_rpms: [2200.0, 2200.0, 2200.0, 2200.0, 2200.0, 2400.0]
          max_rpms: [3500.0, 3500.0, 3500.0, 3500.0, 3500.0, 3500.0] 
        nominal:
          # Normal driving mode - balanced RPMs for performance and efficiency
          min_rpms: [3000.0, 3000.0, 3000.0, 3000.0, 3600.0, 3800.0]
          max_rpms: [5500.0, 6200.0, 6400.0, 6600.0, 6800.0, 6800.0]
        quiet: 
          # Conservative RPMs for noise reduction - shift early, keep RPMs low
          min_rpms: [2200.0, 2200.0, 2200.0, 2200.0, 2400.0, 2600.0]
          max_rpms: [4500.0, 4500.0, 4500.0, 4500.0, 4500.0, 4500.0]
        pitlane:
          # Very conservative for pit lane speed limits - early shifts, low RPM
          min_rpms: [2300.0, 2300.0, 2700.0, 3100.0, 4000.0, 4000.0]
          max_rpms: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0]
        practice:
          # Similar to race mode but slightly more conservative for learning/setup 
          min_rpms: [2200.0, 2200.0, 2600.0, 3000.0, 3600.0, 3800.0]
          max_rpms: [4800.0, 5200.0, 5400.0, 5600.0, 5800.0, 6000.0]
        qualification:
          # Balanced for qualifying - high RPMs but not as aggressive as overboost
          min_rpms: [3000.0, 3000.0, 3000.0, 3000.0, 3600.0, 3800.0]
          max_rpms: [6000.0, 6200.0, 6400.0, 6600.0, 6800.0, 6800.0]
        race: 
          # High performance but sustainable - balance between power and engine life 
          min_rpms: [3000.0, 3000.0, 3000.0, 3000.0, 3600.0, 3800.0]
          max_rpms: [5600.0, 5800.0, 6200.0, 6400.0, 6600.0, 6600.0] 
        overboost: 
          # Aggressive RPMs for maximum power - shift late, high RPM 
          min_rpms: [3000.0, 3000.0, 3000.0, 3000.0, 3600.0, 3800.0]
          max_rpms: [6000.0, 6200.0, 6400.0, 6600.0, 6800.0, 6800.0]

    lqr_config:
      are_max_iter: 1000
      are_error_thresh: 1e-15
      state_performance:
        l_factor: 1.0
        l_const: 1.0
        rc_1_val: 0.2
        l_min: 4.0
        
    
    lqg_config:
      ts: 0.01
      min_speed_mps: 10.0
      max_speed_mps: 100.0
      max_steer_rad: 0.341
      line_error_threshold: 0.001
      initial_state:
        x1: 0.0
        x2: 0.0
        x3: 0.0
        x4: 0.0
      initial_error_cov:
        p0_1: 0.01
        p0_2: 0.01
        p0_3: 0.01
        p0_4: 0.01
      scale_factor:
        x: 2.5
        theta: 0.72
      steady_state_error_correction_multiplier: 0.5 # 1.0 if sensor at front, -1.0 if at rear, 0.0 if at cog
      use_pure_pursuit_params: false
      use_differential_state_params: false

    lkf_config: 
      model_error:
        qf_1: 0.01
        qf_2: 0.01
        qf_3: 0.01
        qf_4: 0.01
      measurement_error:
        rf_1: 0.81
        rf_2: 1.0E-7
        rf_3: 0.81
        rf_4: 1.0E-7
    
    lqg_model:
      radius_from_traj_factor: 2 # Must be an integer >= 1 (eg. if 2, half of the trajectory will be considered for radius of curvature calculation)
      # Controller sample time
      ts: 0.01
      # total mass (kg)
      m: 753.87
      mf: 314.8
      mr: 439.07
      # wheel base (meters)
      L: 2.97
      lf: 1.61
      lr: 1.36
      # front tire cornering stiffness
      cf: 598000.0
      # rear tire cornering stiffness
      cr: 632000.0
      # Rotational Moment of Inertia
      iz: 1000.0

    art_mpc:
      max_mpc_invalid_count: 20
      mpc_invalid_count_threshold: 10
      mpc_engage_speed: 5.0
      mpc_disengage_speed: 7.0

    push2passhandler:
      is_active: false
