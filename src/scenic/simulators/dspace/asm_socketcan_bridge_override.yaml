asm_socketcan_bridge_node:
  ros__parameters:
    sim_manager.host: "10.6.0.3"
    sim_manager.port: 12345

    warn.throttle_interval: 478000

    asm.host: "10.6.0.2"

    use_sim_time: false

    logging.path: "/root/record_log"
    logging.cycle_time: false
    logging.verbose: false
    logging.received_can_frames: false
    logging.received_decoded_frames: false
    logging.sent_can_frames: false

    # DBC version pinned to V23 — the only version shipped in the
    # ghcr.io/airacingtech/iac_asm_socketcan_bridge:art-jazzy image (verified
    # 2026-04-23). race_common's copy of this yaml references V26 which the
    # newer race_common tree ships out-of-band; if the bridge image is updated
    # to include V26, bump this back to keep the two in sync.
    can.can1_dbc_path: "config/CAN1-INDY-V23.dbc"
    can.interface: "can0"

    connection.max_retries: 1
    publish_intervals.publish_map2d_ego_position_ms: 10
